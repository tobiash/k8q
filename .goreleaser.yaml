version: 2

builds:
  - id: k8q
    main: .
    binary: k8q
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
      - -X main.builtBy=goreleaser
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - format: binary
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - 'Merge pull request'
      - 'Merge branch'
  groups:
    - title: Features
      regexp: '^.*feat[\w)]*:+.*$'
      order: 0
    - title: Bug fixes
      regexp: '^.*fix[\w)]*:+.*$'
      order: 1
    - title: Improvements
      regexp: '^.*(?:refactor|perf|improvement)[\w)]*:+.*$'
      order: 2
    - title: Others
      order: 999

release:
  github:
    owner: tobiash
    name: k8q
