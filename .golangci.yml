version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - revive
    - govet
    - staticcheck
    - gosec
    - ineffassign
    - misspell
    - gocyclo

  settings:
    revive:
      rules:
        - name: exported
    gocyclo:
      min-complexity: 15

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes: github.com/tobiash/k8q

issues:
  exclude-generated: lax
  max-issues-per-linter: 0
  max-same-issues: 0
